openapi: "3.1.0"
info:
  title: SMA-NG Daemon API
  description: |
    HTTP webhook server for media conversion automation.
    Authentication is optional; when an API key is configured all endpoints
    except `/health`, `/status`, `/`, `/dashboard`, and `/docs` require it.
  version: "1.0.0"

servers:
  - url: http://127.0.0.1:8585
    description: Default local daemon

security:
  - apiKey: []
  - bearerToken: []

components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
    bearerToken:
      type: http
      scheme: bearer

  schemas:
    Job:
      type: object
      properties:
        id:
          type: integer
        path:
          type: string
        config:
          type: string
        args:
          type: string
          description: JSON-encoded list of extra arguments
        status:
          type: string
          enum: [pending, running, completed, failed, cancelled]
        worker_id:
          type: integer
          nullable: true
        node_id:
          type: string
          nullable: true
        error:
          type: string
          nullable: true
        retry_count:
          type: integer
          default: 0
        max_retries:
          type: integer
          default: 0
        next_attempt_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        progress:
          type: string
          nullable: true
          description: Current timecode (e.g. "00:12:34") when status is running
        priority:
          type: integer
          default: 0
          description: Scheduling priority — higher values run first among pending jobs (FIFO within same priority)
        log_name:
          type: string
          nullable: true
          description: Log file stem for the config used by this job (e.g. "sma-ng")

    JobStats:
      type: object
      additionalProperties:
        type: integer
      example:
        pending: 3
        running: 1
        completed: 150
        failed: 2
        total: 156

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

    LogFile:
      type: object
      properties:
        name:
          type: string
          description: Log name (config file stem, e.g. "sma-ng")
        file:
          type: string
          description: Absolute path to the log file
        size:
          type: integer
          description: Current file size in bytes
        mtime:
          type: string
          format: date-time
          description: Last-modified timestamp in the daemon host's local timezone, including UTC offset

    LogEntry:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          description: Entry timestamp in the daemon host's local timezone, including UTC offset
        level:
          type: string
          enum: [DEBUG, INFO, WARNING, ERROR, CRITICAL]
        message:
          type: string
        job_id:
          type: integer
          nullable: true

paths:
  /health:
    get:
      summary: Daemon health check
      description: Returns node status, uptime, worker count, and job statistics. No authentication required.
      security: []
      operationId: getHealth
      tags: [monitoring]
      responses:
        "200":
          description: Daemon is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  node:
                    type: string
                  started_at:
                    type: string
                    format: date-time
                    description: Daemon start time in the daemon host's local timezone, including UTC offset
                  uptime_seconds:
                    type: integer
                  workers:
                    type: integer
                  jobs:
                    $ref: "#/components/schemas/JobStats"
                  active:
                    type: object
                    description: Map of config path → list of active job objects
                  waiting:
                    type: object
                    description: Map of config path → waiting job count

  /status:
    get:
      summary: Cluster status
      description: Returns cluster-wide node and job status. No authentication required.
      security: []
      operationId: getStatus
      tags: [monitoring]
      responses:
        "200":
          description: Cluster or local status
          content:
            application/json:
              schema:
                type: object

  /stats:
    get:
      summary: Job statistics
      operationId: getStats
      tags: [jobs]
      responses:
        "200":
          description: Job counts by status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobStats"

  /jobs:
    get:
      summary: List jobs
      operationId: listJobs
      tags: [jobs]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, running, completed, failed, cancelled]
        - name: config
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Paginated job list
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: "#/components/schemas/Job"
                  count:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer

  /jobs/{id}:
    get:
      summary: Get a specific job
      operationId: getJob
      tags: [jobs]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job details (includes progress field when running)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "400":
          description: Invalid job ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /jobs/{id}/requeue:
    post:
      summary: Requeue a specific failed job
      operationId: requeueJob
      tags: [jobs]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job requeued
          content:
            application/json:
              schema:
                type: object
                properties:
                  requeued:
                    type: boolean
                  job_id:
                    type: integer
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Job cannot be requeued (not in failed state)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /jobs/{id}/cancel:
    post:
      summary: Cancel a running or pending job
      description: Terminates the conversion subprocess if active; marks pending jobs as cancelled.
      operationId: cancelJob
      tags: [jobs]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  cancelled:
                    type: boolean
                  job_id:
                    type: integer
        "400":
          description: Invalid job ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /jobs/{id}/priority:
    post:
      summary: Set the priority of a pending job
      description: Higher priority jobs are picked up first. Only works on pending jobs.
      operationId: setJobPriority
      tags: [jobs]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [priority]
              properties:
                priority:
                  type: integer
                  description: New priority value (higher = runs sooner, default 0)
      responses:
        "200":
          description: Priority updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: integer
                  priority:
                    type: integer
        "400":
          description: Invalid job ID or body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Job is not in pending state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /jobs/requeue:
    post:
      summary: Requeue all failed jobs
      operationId: requeueAllJobs
      tags: [jobs]
      parameters:
        - name: config
          in: query
          description: Limit requeue to jobs for a specific config file
          schema:
            type: string
      responses:
        "200":
          description: Jobs requeued
          content:
            application/json:
              schema:
                type: object
                properties:
                  requeued:
                    type: integer

  /webhook/sonarr:
    post:
      summary: Native Sonarr webhook endpoint
      description: |
        Accepts a native Sonarr webhook payload (On Download / On Upgrade events).
        Extracts `episodeFile.path`, `series.tvdbId`, and episode numbers, then
        queues the file for conversion.  Test events return 200 without queuing.
        Only the `Download` eventType is processed; all others return 400.
      operationId: sonarrWebhook
      tags: [conversion]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [eventType]
              properties:
                eventType:
                  type: string
                  enum: [Download, Test]
                episodeFile:
                  type: object
                  properties:
                    path:
                      type: string
                      description: Absolute path to the imported episode file
                series:
                  type: object
                  properties:
                    tvdbId:
                      type: integer
                    imdbId:
                      type: string
                episodes:
                  type: array
                  items:
                    type: object
                    properties:
                      seasonNumber:
                        type: integer
                      episodeNumber:
                        type: integer
            example:
              eventType: Download
              episodeFile:
                path: /mnt/media/TV/Show/Season 1/S01E01.mkv
              series:
                tvdbId: 73871
              episodes:
                - seasonNumber: 1
                  episodeNumber: 1
      responses:
        "202":
          description: Job queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: queued
                  job_id:
                    type: integer
                  path:
                    type: string
                  config:
                    type: string
        "200":
          description: Test event acknowledged or duplicate job
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
        "400":
          description: Bad request (missing path, unsupported eventType)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /webhook/radarr:
    post:
      summary: Native Radarr webhook endpoint
      description: |
        Accepts a native Radarr webhook payload (On Download / On Upgrade events).
        Extracts `movieFile.path` and `movie.tmdbId` (or `imdbId` as fallback),
        then queues the file for conversion.  Test events return 200 without queuing.
        Only the `Download` eventType is processed; all others return 400.
      operationId: radarrWebhook
      tags: [conversion]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [eventType]
              properties:
                eventType:
                  type: string
                  enum: [Download, Test]
                movieFile:
                  type: object
                  properties:
                    path:
                      type: string
                      description: Absolute path to the imported movie file
                movie:
                  type: object
                  properties:
                    tmdbId:
                      type: integer
                    imdbId:
                      type: string
            example:
              eventType: Download
              movieFile:
                path: /mnt/media/Movies/The Matrix (1999).mkv
              movie:
                tmdbId: 603
      responses:
        "202":
          description: Job queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: queued
                  job_id:
                    type: integer
                  path:
                    type: string
                  config:
                    type: string
        "200":
          description: Test event acknowledged or duplicate job
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
        "400":
          description: Bad request (missing path, unsupported eventType)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /configs:
    get:
      summary: Show path-to-config mappings
      operationId: getConfigs
      tags: [configuration]
      responses:
        "200":
          description: Current path mappings and per-config status
          content:
            application/json:
              schema:
                type: object
                properties:
                  default_config:
                    type: string
                  default_args:
                    type: array
                    items:
                      type: string
                  default_log:
                    type: string
                  default_log_name:
                    type: string
                    description: Log name for the default config (e.g. "sma-ng")
                  default_active_jobs:
                    type: array
                  default_pending_jobs:
                    type: integer
                  path_configs:
                    type: array
                    items:
                      type: object
                      properties:
                        path:
                          type: string
                        config:
                          type: string
                        default_args:
                          type: array
                          items:
                            type: string
                        log_file:
                          type: string
                        log_name:
                          type: string
                          description: Log name for this config (e.g. "sma-ng")
                        active_jobs:
                          type: array
                        pending_jobs:
                          type: integer
                  logs_directory:
                    type: string

  /cleanup:
    post:
      summary: Remove old completed and failed jobs
      operationId: cleanup
      tags: [jobs]
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Cleanup result
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                  days:
                    type: integer

  /reload:
    post:
      summary: Reload daemon configuration in-place
      description: Re-reads the Daemon section from sma-ng.yml without restarting workers or active conversions.
      operationId: reload
      tags: [management]
      responses:
        "200":
          description: Reload initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: reloading

  /restart:
    post:
      summary: Gracefully restart the daemon
      description: Waits for active conversions to finish, then re-execs the process.
      operationId: restart
      tags: [management]
      responses:
        "202":
          description: Restart initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: restarting
                  active_jobs:
                    type: integer

  /shutdown:
    post:
      summary: Gracefully shut down the daemon
      description: Waits for active conversions to finish, then exits.
      operationId: shutdown
      tags: [management]
      responses:
        "202":
          description: Shutdown initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: shutting_down
                  active_jobs:
                    type: integer

  /admin/nodes/{nodeId}/{action}:
    post:
      summary: Perform an admin action on a cluster node
      description: |
        Distributed-mode node management endpoint used by the admin UI.
        Actions: approve, reject, restart, shutdown, delete.
      operationId: adminNodeAction
      tags: [management]
      parameters:
        - name: nodeId
          in: path
          required: true
          schema:
            type: string
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum: [approve, reject, restart, shutdown, delete]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                note:
                  type: string
                  description: Optional approval or rejection note
      responses:
        "200":
          description: Approval/rejection/delete completed
          content:
            application/json:
              schema:
                type: object
        "202":
          description: Restart/shutdown command queued for the target node
          content:
            application/json:
              schema:
                type: object
        "404":
          description: Node not found or unknown action
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /scan:
    get:
      summary: Filter a list of paths to those not yet scanned
      description: Useful for incremental directory scans. For large lists use POST /scan/filter.
      operationId: getScan
      tags: [scanning]
      parameters:
        - name: path
          in: query
          explode: true
          schema:
            type: array
            items:
              type: string
      responses:
        "200":
          description: Unscanned paths
          content:
            application/json:
              schema:
                type: object
                properties:
                  unscanned:
                    type: array
                    items:
                      type: string
                  total:
                    type: integer
                  already_scanned:
                    type: integer

  /scan/filter:
    post:
      summary: Filter a list of paths to those not yet scanned (bulk)
      operationId: scanFilter
      tags: [scanning]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [paths]
              properties:
                paths:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Unscanned paths
          content:
            application/json:
              schema:
                type: object
                properties:
                  unscanned:
                    type: array
                    items:
                      type: string
                  total:
                    type: integer
                  already_scanned:
                    type: integer

  /scan/record:
    post:
      summary: Record paths as scanned
      operationId: scanRecord
      tags: [scanning]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [paths]
              properties:
                paths:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Paths recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  recorded:
                    type: integer

  /browse:
    get:
      summary: Browse directories and media files
      description: Lists directories and media files under a configured path. Returns top-level roots if no path is given.
      operationId: browse
      tags: [files]
      parameters:
        - name: path
          in: query
          schema:
            type: string
          description: Absolute path to browse (must be under a configured media root)
      responses:
        "200":
          description: Directory listing
          content:
            application/json:
              schema:
                type: object
                properties:
                  dirs:
                    type: array
                    items:
                      type: string
                  files:
                    type: array
                    items:
                      type: string
        "403":
          description: Path is outside configured roots or permission denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Directory not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /logs:
    get:
      summary: List all log files
      operationId: listLogs
      tags: [logs]
      responses:
        "200":
          description: Log file metadata
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LogFile"

  /logs/{name}:
    get:
      summary: Get log content
      operationId: getLogContent
      tags: [logs]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: Log name (config file stem, e.g. "sma-ng")
        - name: lines
          in: query
          schema:
            type: integer
            default: 200
          description: Maximum lines to return (tail of file)
        - name: level
          in: query
          schema:
            type: string
            enum: [DEBUG, INFO, WARNING, ERROR, CRITICAL]
          description: Minimum log level filter
        - name: job_id
          in: query
          schema:
            type: integer
          description: Filter entries to a specific job
        - name: offset
          in: query
          schema:
            type: integer
          description: Return content starting from this byte offset
      responses:
        "200":
          description: Log entries and current file size
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      $ref: "#/components/schemas/LogEntry"
                  file_size:
                    type: integer
        "404":
          description: Log file not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /logs/{name}/tail:
    get:
      summary: Poll for new log entries after a byte offset
      description: Returns entries written after the given byte offset. Use `file_size` from each response as the next `offset`. Resets automatically on log rotation.
      operationId: tailLog
      tags: [logs]
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: offset
          in: query
          required: true
          schema:
            type: integer
          description: Byte offset from a previous response's file_size
        - name: level
          in: query
          schema:
            type: string
            enum: [DEBUG, INFO, WARNING, ERROR, CRITICAL]
        - name: job_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: New log entries since offset
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      $ref: "#/components/schemas/LogEntry"
                  file_size:
                    type: integer
        "404":
          description: Log file not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
