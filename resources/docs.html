<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SMA-NG Documentation</title>
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/newdave/sma-ng/main/logo.png">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .copy-btn { position:absolute; top:0.5rem; right:0.5rem; opacity:0; transition:opacity 0.15s; }
  pre:hover .copy-btn { opacity:1; }
  pre { position:relative; }
</style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
<div class="flex min-h-screen">
  <!-- Sidebar -->
  <nav class="w-56 flex-shrink-0 bg-gray-800 border-r border-gray-700 px-3 py-6 flex flex-col gap-1">
    <a href="/dashboard" class="text-blue-400 hover:text-blue-300 text-xs mb-4 block">&larr; Dashboard</a>
    %NAV%
  </nav>
  <!-- Content -->
  <div class="flex-1 max-w-4xl mx-auto px-8 py-10">
    <article class="prose-invert">
      %s
    </article>
    <div class="mt-16 mb-8 pt-8 border-t border-gray-700 text-center text-gray-500 text-xs">
      SMA-NG Documentation
    </div>
  </div>
</div>
<script>
document.querySelectorAll('pre').forEach(pre => {
  const btn = document.createElement('button');
  btn.className = 'copy-btn bg-gray-700 hover:bg-gray-600 text-gray-300 hover:text-white text-xs px-2 py-1 rounded';
  btn.textContent = 'Copy';
  btn.addEventListener('click', () => {
    const code = pre.querySelector('code');
    navigator.clipboard.writeText(code ? code.textContent : pre.textContent).then(() => {
      btn.textContent = 'Copied!';
      setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
    });
  });
  pre.appendChild(btn);
});
</script>
</body>
</html>
