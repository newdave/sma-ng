[loggers]
keys = root, manual, nzbget, daemon

[handlers]
keys = consoleHandler, nzbgetHandler, manualHandler, daemonHandler

[formatters]
keys = simpleFormatter, minimalFormatter, nzbgetFormatter, daemonFormatter

[logger_root]
level = DEBUG
handlers = consoleHandler

[logger_nzbget]
level = DEBUG
handlers = nzbgetHandler
propagate = 0
qualname = NZBGetPostProcess

[logger_manual]
level = DEBUG
handlers = manualHandler
propagate = 0
qualname = MANUAL

[logger_daemon]
level = DEBUG
handlers = daemonHandler
propagate = 0
qualname = DAEMON

[handler_consoleHandler]
class = StreamHandler
level = INFO
formatter = simpleFormatter
args = (sys.stdout,)

[handler_nzbgetHandler]
class = StreamHandler
level = INFO
formatter = nzbgetFormatter
args = (sys.stdout,)

[handler_manualHandler]
class = StreamHandler
level = INFO
formatter = minimalFormatter
args = (sys.stdout,)

[handler_daemonHandler]
class = handlers.RotatingFileHandler
level = INFO
formatter = daemonFormatter
args = ('/Users/dhill/Projects/sma/logs/daemon.log', 'a', 10485760, 5, 'utf-8')

[formatter_simpleFormatter]
format = %(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt = %Y-%m-%d %H:%M:%S

[formatter_minimalFormatter]
format = %(message)s
datefmt =

[formatter_nzbgetFormatter]
format = [%(levelname)s] %(message)s
datefmt =

[formatter_daemonFormatter]
format = %(asctime)s [%(levelname)s] [job:%(job_id)s] %(message)s
datefmt = %Y-%m-%d %H:%M:%S
