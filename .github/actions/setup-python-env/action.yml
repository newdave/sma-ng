name: Setup Python Environment
description: Set up Python with pip caching and install the requested dependencies.

inputs:
  python-version:
    description: Python version to install.
    required: true
  install-command:
    description: Shell command used to install dependencies after Python is set up.
    required: true

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
        cache-dependency-path: |
          pyproject.toml
          setup/requirements*.txt
          .pre-commit-config.yaml

    - name: Install dependencies
      shell: bash
      run: ${{ inputs.install-command }}
