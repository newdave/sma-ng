name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── Step 1: Run release-please on every push to main ────────────────────────
  # Creates or updates a "Release PR" that bumps pyproject.toml and the
  # release-please manifest. When that PR is merged, release-please creates
  # the GitHub Release and the v* tag, then sets release_created=true so
  # the publish job below runs.
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      upload_url: ${{ steps.rp.outputs.upload_url }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  # ── Step 2: Build & attach dist artifacts to the GitHub Release ─────────────
  # Runs only when release-please actually created a release (not on every push).
  # The version in pyproject.toml is the single source of truth — release-please
  # has already bumped it before this job runs.
  publish:
    name: Build & publish release artifacts
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the release commit (the tag), not the PR merge commit
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload dist to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: dist/*
