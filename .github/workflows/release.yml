name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "tests/**"
      - "**/*.md"
      - "resources/docs.html"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  # ── Step 1: Run release-please on every push to main ────────────────────────
  # Creates or updates a "Release PR" that bumps pyproject.toml and the
  # release-please manifest. When that PR is merged, release-please creates
  # the GitHub Release and the v* tag, then sets release_created=true so
  # the publish and docker jobs below run.
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      pr: ${{ steps.rp.outputs.pr }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  # ── Step 1b: Auto-merge the release PR ──────────────────────────────────────
  # After release-please opens or updates the Release PR, immediately approve
  # and enable auto-merge so it merges as soon as required status checks pass.
  # If no PR was created (release_created run) this job is a no-op.
  auto-merge-release-pr:
    name: Auto-merge Release PR
    needs: release-please
    if: needs.release-please.outputs.pr != ''
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ fromJSON(needs.release-please.outputs.pr).number }}
        run: gh pr merge "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --squash --auto

  # ── Step 2a: Build & attach dist artifacts to the GitHub Release ─────────────
  # Runs only when release-please actually created a release (not on every push).
  # The version in pyproject.toml is the single source of truth — release-please
  # has already bumped it before this job runs.
  publish:
    name: Build & publish release artifacts
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Python environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: "3.12"
          install-command: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload dist to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: dist/*

  # ── Step 2b: Docker image ───────────────────────────────────────────────────
  # docker.yml triggers automatically on the v* tag that release-please creates.
  # It handles QEMU, multi-arch (amd64 + arm64), semver tags, and latest.
  # Nothing to do here — no duplication needed.
