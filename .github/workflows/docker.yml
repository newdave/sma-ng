name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "docker/Dockerfile"
      - "docker/docker-entrypoint.sh"
      - "setup/requirements*.txt"
      - "pyproject.toml"
      - "**.py"
      - ".github/workflows/docker.yml"
  pull_request:
    branches: [main]
    paths:
      - "docker/Dockerfile"
      - "docker/docker-entrypoint.sh"
      - "setup/requirements*.txt"
      - "pyproject.toml"
      - "**.py"
      - ".github/workflows/docker.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      # On PRs: build only (no push) to verify the Dockerfile is valid.
      # On push to main or tags: build and push to GHCR.
      # Registry cache (type=registry) persists indefinitely in GHCR,
      # keeping the ffmpeg-builder stage cached across runs without
      # relying on the 10GB/7-day GHA cache limit.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: runtime
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: ${{ github.event_name != 'pull_request' && format('type=registry,ref={0}/{1}:buildcache,mode=max', env.REGISTRY, env.IMAGE_NAME) || '' }}
          build-args: |
            FFMPEG_VERSION=8.0

      - name: Smoke-test image (PR only)
        if: github.event_name == 'pull_request'
        run: |
          docker run --rm --entrypoint python3 \
            ${{ fromJSON(steps.meta.outputs.json).tags[0] }} \
            -c "import daemon; print('daemon module OK')"
