name: CI

on:
  push:
    branches: [main]
    paths:
      - "**.py"
      - "setup/requirements*.txt"
      - "pyproject.toml"
      - ".pre-commit-config.yaml"
      - "docs/openapi.yaml"
      - ".github/workflows/ci.yml"
      - ".github/actions/setup-python-env/**"
  pull_request:
    branches: [main]
    paths:
      - "**.py"
      - "setup/requirements*.txt"
      - "pyproject.toml"
      - ".pre-commit-config.yaml"
      - "docs/openapi.yaml"
      - ".github/workflows/ci.yml"
      - ".github/actions/setup-python-env/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Set up Python environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}
          install-command: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --cov=resources --cov=converter --cov=autoprocess --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  openapi:
    name: Validate OpenAPI spec
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: "3.12"
          install-command: pip install -e ".[dev]"

      - name: Validate docs/openapi.yaml
        run: python -m openapi_spec_validator docs/openapi.yaml
