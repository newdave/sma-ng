name: CI

on:
  push:
    branches: [main]
    paths:
      - "**.py"
      - "setup/requirements*.txt"
      - "pyproject.toml"
      - ".pre-commit-config.yaml"
      - "docs/openapi.yaml"
      - ".github/workflows/ci.yml"
      - ".mise/tasks/**"
  pull_request:
    branches: [main]
    paths:
      - "**.py"
      - "setup/requirements*.txt"
      - "pyproject.toml"
      - ".pre-commit-config.yaml"
      - "docs/openapi.yaml"
      - ".github/workflows/ci.yml"
      - ".mise/tasks/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-ffmpeg-${{ runner.os }}
          restore-keys: apt-ffmpeg-

      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends ffmpeg

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            setup/requirements*.txt

      - uses: jdx/mise-action@v2
        with:
          install: false

      - name: Set up venv and install dev deps
        run: mise run setup:deps:dev

      - name: Run tests
        run: mise run test:cov

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  openapi:
    name: Validate OpenAPI spec
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            setup/requirements*.txt

      - uses: jdx/mise-action@v2
        with:
          install: false

      - name: Set up venv and install dev deps
        run: mise run setup:deps:dev

      - name: Validate OpenAPI spec
        run: mise run test:openapi
