services:

  # ────────────────────────────────────────────────────────────────────
  # PostgreSQL database — only started by the *-pg profiles.
  #
  # Credentials resolved from SMA_DAEMON_DB_* first, then POSTGRES_* fallbacks:
  #   SMA_DAEMON_DB_PASSWORD=<required>  (or POSTGRES_PASSWORD)
  #   SMA_DAEMON_DB_USER=sma             (or POSTGRES_USER)
  #   SMA_DAEMON_DB_NAME=sma             (or POSTGRES_DB)
  #
  # Profiles that include this service:
  #   software-pg   intel-pg   nvidia-pg
  # ────────────────────────────────────────────────────────────────────
  sma-pgsql:
    image: postgres:16-alpine
    container_name: sma-postgres
    profiles: [software-pg, intel-pg, nvidia-pg]
    restart: unless-stopped
    networks:
      - sma-net
    env_file:
      - path: /opt/sma/config/daemon.env
        required: true
    volumes:
      - sma-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-sma} -d $${POSTGRES_DB:-sma}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ────────────────────────────────────────────────────────────────────
  # Encoder/profile matrix:
  #   software      — CPU-only, external PostgreSQL or no DB
  #   software-pg   — CPU-only, bundled PostgreSQL
  #   intel         — Intel QSV + VAAPI, external PostgreSQL or no DB
  #   intel-pg      — Intel QSV + VAAPI, bundled PostgreSQL
  #   nvidia        — NVIDIA NVENC/NVDEC, external PostgreSQL or no DB
  #   nvidia-pg     — NVIDIA NVENC/NVDEC, bundled PostgreSQL
  #
  # Examples:
  #   docker compose --profile software up
  #   docker compose --profile software-pg up
  #   docker compose --profile intel up
  #   docker compose --profile intel-pg up
  #   docker compose --profile nvidia up
  #   docker compose --profile nvidia-pg up
  # ────────────────────────────────────────────────────────────────────
  sma-software:
    image: ghcr.io/newdave/sma-ng:${SMA_IMAGE_TAG:-latest}
    container_name: sma-ng-software
    profiles: [software]
    restart: unless-stopped
    ports:
      - "${SMA_PORT:-8585}:8585"
    volumes:
      - /opt/sma/config:/config
      - /opt/sma/logs:/logs
      - /mnt:/mnt
      - /mnt/unionfs/downloads:/downloads
      - /transcodes:/transcodes
    env_file:
      - path: /opt/sma/config/daemon.env
        required: true
    networks:
      - sma-net

  sma-software-pg:
    image: ghcr.io/newdave/sma-ng:${SMA_IMAGE_TAG:-latest}
    container_name: sma-ng-software-pg
    profiles: [software-pg]
    restart: unless-stopped
    ports:
      - "${SMA_PORT:-8585}:8585"
    volumes:
      - /opt/sma/config:/config
      - /opt/sma/logs:/logs
      - /mnt:/mnt
      - /mnt/unionfs/downloads:/downloads
      - /transcodes:/transcodes
    depends_on:
      sma-pgsql:
        condition: service_healthy
    env_file:
      - path: /opt/sma/config/daemon.env
        required: true
    networks:
      - sma-net

  sma-nvidia:
    image: ghcr.io/newdave/sma-ng:${SMA_IMAGE_TAG:-latest}
    container_name: sma-ng-nvidia
    profiles: [nvidia]
    restart: unless-stopped
    ports:
      - "${SMA_PORT:-8585}:8585"
    volumes:
      - /opt/sma/config:/config
      - /opt/sma/logs:/logs
      - /mnt:/mnt
      - /mnt/unionfs/downloads:/downloads
      - /transcodes:/transcodes
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, video]
    env_file:
      - path: /opt/sma/config/daemon.env
        required: true
    networks:
      - sma-net

  sma-nvidia-pg:
    image: ghcr.io/newdave/sma-ng:${SMA_IMAGE_TAG:-latest}
    container_name: sma-ng-nvidia-pg
    profiles: [nvidia-pg]
    restart: unless-stopped
    ports:
      - "${SMA_PORT:-8585}:8585"
    volumes:
      - /opt/sma/config:/config
      - /opt/sma/logs:/logs
      - /mnt:/mnt
      - /mnt/unionfs/downloads:/downloads
      - /transcodes:/transcodes
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, video]
    depends_on:
      sma-pgsql:
        condition: service_healthy
    env_file:
      - path: /opt/sma/config/daemon.env
        required: true
    networks:
      - sma-net

  sma-intel:
    image: ghcr.io/newdave/sma-ng:${SMA_IMAGE_TAG:-latest}
    container_name: sma-ng-intel
    profiles: [intel]
    restart: unless-stopped
    ports:
      - "${SMA_PORT:-8585}:8585"
    volumes:
      - /opt/sma/config:/config
      - /opt/sma/logs:/logs
      - /mnt:/mnt
      - /mnt/unionfs/downloads:/downloads
      - /transcodes:/transcodes
    devices:
      - /dev/dri/card1:/dev/dri/card0
      - /dev/dri/renderD128:/dev/dri/renderD128
    group_add:
      - "${RENDER_GID:-109}"
      - "${VIDEO_GID:-44}"
    env_file:
      - path: /opt/sma/config/daemon.env
        required: true
    networks:
      - sma-net

  sma-intel-pg:
    image: ghcr.io/newdave/sma-ng:${SMA_IMAGE_TAG:-latest}
    container_name: sma-ng-intel-pg
    profiles: [intel-pg]
    restart: unless-stopped
    ports:
      - "${SMA_PORT:-8585}:8585"
    volumes:
      - /opt/sma/config:/config
      - /opt/sma/logs:/logs
      - /mnt:/mnt
      - /mnt/unionfs/downloads:/downloads
      - /transcodes:/transcodes
    devices:
      - /dev/dri/card1:/dev/dri/card0
      - /dev/dri/renderD128:/dev/dri/renderD128
    group_add:
      - "${RENDER_GID:-109}"
      - "${VIDEO_GID:-44}"
    depends_on:
      sma-pgsql:
        condition: service_healthy
    env_file:
      - path: /opt/sma/config/daemon.env
        required: true
    networks:
      - sma-net

volumes:
  sma-pgdata:

networks:
  sma-net:
    driver: bridge
    internal: false
