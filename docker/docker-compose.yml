services:

  # ────────────────────────────────────────────────────────────────────
  # PostgreSQL database — always started (no profile required).
  #
  # If you have an external PostgreSQL instance, remove this service
  # and set SMA_DAEMON_DB_URL directly in daemon.env.
  #
  # Default credentials (override in .env):
  #   POSTGRES_PASSWORD=<required>
  #   POSTGRES_USER=sma  POSTGRES_DB=sma
  #
  # SMA will connect via:
  #   SMA_DAEMON_DB_URL=postgresql://sma:<password>@postgres:5432/sma
  # ────────────────────────────────────────────────────────────────────
  sma-pgsql:
    image: postgres:16-alpine
    container_name: sma-postgres
    restart: unless-stopped
    networks:
      - sma-net
    ports:
      # Not exposed by default. Set PGSQL_PORT in .env to publish:
      #   PGSQL_PORT=5432
      - "${PGSQL_PORT:-}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sma}
      POSTGRES_USER: ${POSTGRES_USER:-sma}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env or environment}
    volumes:
      - sma-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sma} -d ${POSTGRES_DB:-sma}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ────────────────────────────────────────────────────────────────────
  # Base SMA service definition — referenced by all GPU profiles via
  # 'extends'. Not started directly; choose a profile below.
  #
  # Profiles (pick one):
  #   software     — CPU-only encoding (no GPU)
  #   intel        — Intel QSV + VAAPI
  #   nvidia       — NVIDIA NVENC/NVDEC
  #
  # Usage:
  #   docker compose --profile software up
  #   docker compose --profile intel    up
  #   docker compose --profile nvidia   up
  # ────────────────────────────────────────────────────────────────────
  sma:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runtime
    image: sma-ng:latest
    container_name: sma-ng
    profiles: [software]
    restart: unless-stopped
    ports:
      - "${SMA_PORT:-8585}:8585"
    volumes:
      - /opt/sma/config:/config
      - /opt/sma/logs:/logs
      - /mnt:/mnt
      - /mnt/unionfs/downloads:/downloads
      - /transcodes:/transcodes
    environment:
      # SMA paths
      - SMA_CONFIG=/config/autoProcess.ini
      - SMA_FFMPEG=/usr/local/bin/ffmpeg
      - SMA_FFPROBE=/usr/local/bin/ffprobe
      # Daemon networking
      - SMA_DAEMON_HOST=${SMA_DAEMON_HOST:-0.0.0.0}
      - SMA_DAEMON_PORT=${SMA_DAEMON_PORT:-8585}
      - SMA_DAEMON_WORKERS=${SMA_DAEMON_WORKERS:-2}
      # Daemon config / logs
      - SMA_DAEMON_CONFIG=${SMA_DAEMON_CONFIG:-/config/daemon.json}
      - SMA_DAEMON_LOGS_DIR=${SMA_DAEMON_LOGS_DIR:-/logs}
      # Authentication
      - SMA_DAEMON_API_KEY=${SMA_DAEMON_API_KEY:-}
      # Database — defaults to the bundled sma-pgsql service.
      # Override in .env or daemon.env to use an external instance.
      - SMA_DAEMON_DB_URL=${SMA_DAEMON_DB_URL:-postgresql://${POSTGRES_USER:-sma}:${POSTGRES_PASSWORD}@sma-pgsql:5432/${POSTGRES_DB:-sma}}
    env_file:
      - path: /opt/sma/config/daemon.env
        required: false
    networks:
      - sma-net
    depends_on:
      sma-pgsql:
        condition: service_healthy
        required: false

  # ────────────────────────────────────────────────────────────────────
  # NVIDIA GPU (NVENC/NVDEC)
  # Requirements: nvidia-container-toolkit installed on host
  # Usage: docker compose --profile nvidia up
  # ────────────────────────────────────────────────────────────────────
  sma-nvidia:
    extends:
      service: sma
    container_name: sma-ng-nvidia
    profiles: [nvidia]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, video]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=video,compute,utility

  # ────────────────────────────────────────────────────────────────────
  # Intel GPU (QSV + VAAPI via iHD driver)
  # Requirements: Intel GPU on host and /dev/dri access.
  # The container ships VAAPI userspace drivers + vainfo for diagnostics.
  # Usage: docker compose --profile intel up
  # ────────────────────────────────────────────────────────────────────
  sma-intel:
    extends:
      service: sma
    container_name: sma-ng-intel
    profiles: [intel]
    devices:
      - /dev/dri:/dev/dri
    group_add:
      # Numeric GIDs from the host for /dev/dri access.
      # Group names are resolved inside the container (where they don't
      # exist), so numeric IDs must be used. Override in .env if your
      # host uses different GIDs:
      #   RENDER_GID=$(getent group render | cut -d: -f3)
      #   VIDEO_GID=$(getent group video  | cut -d: -f3)
      - "${RENDER_GID:-109}"
      - "${VIDEO_GID:-44}"
    environment:
      - LIBVA_DRIVER_NAME=${LIBVA_DRIVER_NAME:-iHD}

volumes:
  # Persistent storage for the bundled PostgreSQL instance.
  sma-pgdata:

networks:
  # Private bridge network — only sma-ng and sma-pgsql can communicate.
  # PostgreSQL is not exposed to the host.
  sma-net:
    driver: bridge
    internal: false
