services:

  # ────────────────────────────────────────────────────────────────────
  # Optional PostgreSQL database
  #
  # Use this when you don't have an external PostgreSQL instance.
  # Activate with the 'postgres' profile:
  #   docker compose --profile postgres up
  #
  # SMA will automatically use it when SMA_DAEMON_DB_URL is unset and
  # this service is running — set the variable in daemon.env or pass it
  # directly:
  #   SMA_DAEMON_DB_URL=postgresql://sma:sma@postgres:5432/sma
  # ────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sma-postgres
    profiles: [postgres]
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sma}
      POSTGRES_USER: ${POSTGRES_USER:-sma}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env or environment}
    volumes:
      - sma-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sma} -d ${POSTGRES_DB:-sma}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ────────────────────────────────────────────────────────────────────
  # CPU-only (no GPU acceleration)
  # Usage: docker compose up sma
  #
  # With bundled PostgreSQL:
  #   docker compose --profile postgres up
  # ────────────────────────────────────────────────────────────────────
  sma:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runtime
    image: sma-ng:latest
    container_name: sma-ng
    restart: unless-stopped
    ports:
      - "${SMA_PORT:-8585}:8585"
    volumes:
      - /opt/sma/config:/config
      - /opt/sma/logs:/logs
      - /mnt:/mnt
      - /mnt/unionfs/downloads:/downloads
      - /transcode:/transcode
    environment:
      - SMA_CONFIG=/config/autoProcess.ini
      - SMA_DAEMON_API_KEY=${SMA_DAEMON_API_KEY:-}
      - SMA_DAEMON_DB_URL=${SMA_DAEMON_DB_URL:-}
    env_file:
      - path: /opt/sma/config/daemon.env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
        required: false

  # ────────────────────────────────────────────────────────────────────
  # NVIDIA GPU (NVENC/NVDEC)
  # Requirements: nvidia-container-toolkit installed on host
  # Usage: docker compose --profile nvidia up sma-nvidia
  # ────────────────────────────────────────────────────────────────────
  sma-nvidia:
    extends:
      service: sma
    container_name: sma-ng-nvidia
    profiles: [nvidia]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, video]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=video,compute,utility

  # ────────────────────────────────────────────────────────────────────
  # Intel GPU (QSV + VAAPI via iHD driver)
  # Requirements: Intel GPU on host; intel-media-va-driver or
  #               intel-media-va-driver-non-free installed on host
  # Usage: docker compose --profile intel up sma-intel
  # ────────────────────────────────────────────────────────────────────
  sma-intel:
    extends:
      service: sma
    container_name: sma-ng-intel
    profiles: [intel]
    devices:
      - /dev/dri:/dev/dri
    group_add:
      # Add the 'render' and 'video' group IDs from the host so the
      # container user can access /dev/dri/renderD128
      - "render"
      - "video"

  # ────────────────────────────────────────────────────────────────────
  # AMD GPU (VAAPI via radeonsi/amdgpu driver)
  # Usage: docker compose --profile amd up sma-amd
  # ────────────────────────────────────────────────────────────────────
  sma-amd:
    extends:
      service: sma
    container_name: sma-ng-amd
    profiles: [amd]
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "render"
      - "video"

volumes:
  # Persistent storage for the bundled PostgreSQL instance.
  # Only created when the 'postgres' profile is active.
  sma-pgdata:
