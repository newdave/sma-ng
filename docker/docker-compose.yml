services:

  # ────────────────────────────────────────────────────────────────────
  # Encoder/profile matrix:
  #   software      — CPU-only, local SQLite by default
  #   software-pg   — CPU-only, external PostgreSQL via daemon.db-url in sma-ng.yml
  #   intel         — Intel QSV + VAAPI, local SQLite by default
  #   intel-pg      — Intel QSV + VAAPI, external PostgreSQL via daemon.db-url in sma-ng.yml
  #   nvidia        — NVIDIA NVENC/NVDEC, local SQLite by default
  #   nvidia-pg     — NVIDIA NVENC/NVDEC, external PostgreSQL via daemon.db-url in sma-ng.yml
  #
  # Examples:
  #   docker compose --profile software up
  #   docker compose --profile software-pg up
  #   docker compose --profile intel up
  #   docker compose --profile intel-pg up
  #   docker compose --profile nvidia up
  #   docker compose --profile nvidia-pg up
  # ────────────────────────────────────────────────────────────────────
  sma-software:
    image: ${IMAGE:-ghcr.io/newdave/sma-ng}:${IMAGE_TAG:-latest}
    container_name: sma-ng
    hostname: "sma-ng"
    profiles: [software]
    restart: unless-stopped
    # Workaround for host AppArmor docker-default profile denying AF_UNIX
    # socket creation when dockerd runs nested inside an LXC. Affects pgsql
    # (cannot create /var/run/postgresql/.s.PGSQL.5432) and python AF_UNIX
    # users in the sma daemon. Safe on non-LXC hosts.
    security_opt:
      - apparmor=unconfined
    ports:
      - "${PORT:-8585}:8585"
    volumes:
      - /opt/sma/config:/config
      - /opt/sma/logs:/logs
      - /opt/sma/data:/data
      - /mnt:/mnt
      - /mnt/unionfs/downloads:/downloads
      - /transcodes:/transcodes
    env_file:
      - path: ../config/daemon.env
        required: true
    networks:
      - sma-net

  sma-software-pg:
    image: ${IMAGE:-ghcr.io/newdave/sma-ng}:${IMAGE_TAG:-latest}
    container_name: sma-ng
    hostname: "sma-ng"
    profiles: [software-pg]
    restart: unless-stopped
    # Workaround for host AppArmor docker-default profile denying AF_UNIX
    # socket creation when dockerd runs nested inside an LXC. Affects pgsql
    # (cannot create /var/run/postgresql/.s.PGSQL.5432) and python AF_UNIX
    # users in the sma daemon. Safe on non-LXC hosts.
    security_opt:
      - apparmor=unconfined
    ports:
      - "${PORT:-8585}:8585"
    volumes:
      - /opt/sma/config:/config
      - /opt/sma/logs:/logs
      - /opt/sma/data:/data
      - /mnt:/mnt
      - /mnt/unionfs/downloads:/downloads
      - /transcodes:/transcodes
    env_file:
      - path: ../config/daemon.env
        required: true
    networks:
      - sma-net

  sma-nvidia:
    image: ${IMAGE:-ghcr.io/newdave/sma-ng}:${IMAGE_TAG:-latest}
    container_name: sma-ng
    hostname: "sma-ng"
    profiles: [nvidia]
    restart: unless-stopped
    # Workaround for host AppArmor docker-default profile denying AF_UNIX
    # socket creation when dockerd runs nested inside an LXC. Affects pgsql
    # (cannot create /var/run/postgresql/.s.PGSQL.5432) and python AF_UNIX
    # users in the sma daemon. Safe on non-LXC hosts.
    security_opt:
      - apparmor=unconfined
    ports:
      - "${PORT:-8585}:8585"
    volumes:
      - /opt/sma/config:/config
      - /opt/sma/logs:/logs
      - /opt/sma/data:/data
      - /mnt:/mnt
      - /mnt/unionfs/downloads:/downloads
      - /transcodes:/transcodes
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, video]
    env_file:
      - path: ../config/daemon.env
        required: true
    environment:
      NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-all}"
      NVIDIA_DRIVER_CAPABILITIES: "${NVIDIA_DRIVER_CAPABILITIES:-compute,video,utility}"
    networks:
      - sma-net

  sma-nvidia-pg:
    image: ${IMAGE:-ghcr.io/newdave/sma-ng}:${IMAGE_TAG:-latest}
    container_name: sma-ng
    hostname: "sma-ng"
    profiles: [nvidia-pg]
    restart: unless-stopped
    # Workaround for host AppArmor docker-default profile denying AF_UNIX
    # socket creation when dockerd runs nested inside an LXC. Affects pgsql
    # (cannot create /var/run/postgresql/.s.PGSQL.5432) and python AF_UNIX
    # users in the sma daemon. Safe on non-LXC hosts.
    security_opt:
      - apparmor=unconfined
    ports:
      - "${PORT:-8585}:8585"
    volumes:
      - /opt/sma/config:/config
      - /opt/sma/logs:/logs
      - /opt/sma/data:/data
      - /mnt:/mnt
      - /mnt/unionfs/downloads:/downloads
      - /transcodes:/transcodes
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, video]
    env_file:
      - path: ../config/daemon.env
        required: true
    environment:
      NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-all}"
      NVIDIA_DRIVER_CAPABILITIES: "${NVIDIA_DRIVER_CAPABILITIES:-compute,video,utility}"
    networks:
      - sma-net

  sma-intel:
    image: ${IMAGE:-ghcr.io/newdave/sma-ng}:${IMAGE_TAG:-latest}
    container_name: sma-ng
    hostname: "sma-ng"
    profiles: [intel]
    restart: unless-stopped
    # Workaround for host AppArmor docker-default profile denying AF_UNIX
    # socket creation when dockerd runs nested inside an LXC. Affects pgsql
    # (cannot create /var/run/postgresql/.s.PGSQL.5432) and python AF_UNIX
    # users in the sma daemon. Safe on non-LXC hosts.
    security_opt:
      - apparmor=unconfined
    ports:
      - "${PORT:-8585}:8585"
    volumes:
      - /opt/sma/config:/config
      - /opt/sma/logs:/logs
      - /opt/sma/data:/data
      - /mnt:/mnt
      - /mnt/unionfs/downloads:/downloads
      - /transcodes:/transcodes
    devices:
      - /dev/dri:/dev/dri
    # Declarative GPU access: the container's `ubuntu` runtime user joins
    # the host's `video` / `render` groups (and the image's baked-in
    # numeric 992 fallback for hosts where neither group name exists).
    # No root-mode entrypoint GID reconciliation needed.
    #
    # If your host has a non-standard render GID and the names above don't
    # resolve, set SMA_ENTRYPOINT_FIX_GIDS=1 to fall back to the legacy
    # entrypoint behaviour (stats /dev/dri, joins whatever group owns it).
    group_add:
      - "video"
      - "render"
      - "992"
    env_file:
      - path: ../config/daemon.env
        required: true
    networks:
      - sma-net

  sma-intel-pg:
    image: ${IMAGE:-ghcr.io/newdave/sma-ng}:${IMAGE_TAG:-latest}
    container_name: sma-ng
    hostname: "sma-ng"
    profiles: [intel-pg]
    restart: unless-stopped
    # Workaround for host AppArmor docker-default profile denying AF_UNIX
    # socket creation when dockerd runs nested inside an LXC. Affects pgsql
    # (cannot create /var/run/postgresql/.s.PGSQL.5432) and python AF_UNIX
    # users in the sma daemon. Safe on non-LXC hosts.
    security_opt:
      - apparmor=unconfined
    ports:
      - "${PORT:-8585}:8585"
    volumes:
      - /opt/sma/config:/config
      - /opt/sma/logs:/logs
      - /opt/sma/data:/data
      - /mnt:/mnt
      - /mnt/unionfs/downloads:/downloads
      - /transcodes:/transcodes
    devices:
      - /dev/dri/card0:/dev/dri/card0
      - /dev/dri/renderD128:/dev/dri/renderD128
    # Declarative GPU access (mirrors sma-intel). Set
    # SMA_ENTRYPOINT_FIX_GIDS=1 in the environment to fall back to the
    # legacy entrypoint reconciliation on hosts with non-standard render
    # GIDs that neither `video` nor `render` nor `992` resolves.
    group_add:
      - "video"
      - "render"
      - "992"
    env_file:
      - path: ../config/daemon.env
        required: true
    networks:
      - sma-net

networks:
  sma-net:
    driver: bridge
    internal: false
