x-sma-common: &sma-common
  image: ghcr.io/newdave/sma-ng:${SMA_IMAGE_TAG:-latest}
  restart: unless-stopped
  ports:
    - "${SMA_PORT:-8585}:8585"
  volumes:
    - /opt/sma/config:/config
    - /opt/sma/logs:/logs
    - /mnt:/mnt
    - /mnt/unionfs/downloads:/downloads
    - /transcodes:/transcodes
  environment: &sma-env
    SMA_CONFIG: /config/autoProcess.ini
    SMA_FFMPEG: /usr/local/bin/ffmpeg
    SMA_FFPROBE: /usr/local/bin/ffprobe
    SMA_DAEMON_HOST: ${SMA_DAEMON_HOST:-0.0.0.0}
    SMA_DAEMON_PORT: ${SMA_DAEMON_PORT:-8585}
    SMA_DAEMON_WORKERS: ${SMA_DAEMON_WORKERS:-2}
    SMA_DAEMON_CONFIG: ${SMA_DAEMON_CONFIG:-/config/daemon.json}
    SMA_DAEMON_LOGS_DIR: ${SMA_DAEMON_LOGS_DIR:-/logs}
    SMA_DAEMON_API_KEY: ${SMA_DAEMON_API_KEY:-}
    SMA_DAEMON_DB_URL: ${SMA_DAEMON_DB_URL:-}
    SMA_DAEMON_DB_HOST: ${SMA_DAEMON_DB_HOST:-}
    SMA_DAEMON_DB_PORT: ${SMA_DAEMON_DB_PORT:-}
    SMA_DAEMON_DB_USER: ${SMA_DAEMON_DB_USER:-}
    SMA_DAEMON_DB_PASSWORD: ${SMA_DAEMON_DB_PASSWORD:-}
    SMA_DAEMON_DB_NAME: ${SMA_DAEMON_DB_NAME:-}
  env_file:
    - path: /opt/sma/config/daemon.env
      required: false
  networks:
    - sma-net

x-sma-depends-on-pg: &sma-depends-on-pg
  sma-pgsql:
    condition: service_healthy

x-sma-nvidia-env: &sma-nvidia-env
  NVIDIA_VISIBLE_DEVICES: all
  NVIDIA_DRIVER_CAPABILITIES: video,compute,utility

x-sma-nvidia-deploy: &sma-nvidia-deploy
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu, video]

x-sma-intel-env: &sma-intel-env
  LIBVA_DRIVER_NAME: ${LIBVA_DRIVER_NAME:-iHD}

x-sma-intel-device-config: &sma-intel-device-config
  devices:
    - /dev/dri/renderD128:/dev/dri/renderD128
  group_add:
    - "${RENDER_GID:-109}"

services:

  # ────────────────────────────────────────────────────────────────────
  # PostgreSQL database — only started by the *-pg profiles.
  #
  # Credentials resolved from SMA_DAEMON_DB_* first, then POSTGRES_* fallbacks:
  #   SMA_DAEMON_DB_PASSWORD=<required>  (or POSTGRES_PASSWORD)
  #   SMA_DAEMON_DB_USER=sma             (or POSTGRES_USER)
  #   SMA_DAEMON_DB_NAME=sma             (or POSTGRES_DB)
  #
  # Profiles that include this service:
  #   software-pg   intel-pg   nvidia-pg
  # ────────────────────────────────────────────────────────────────────
  sma-pgsql:
    image: postgres:16-alpine
    container_name: sma-postgres
    profiles: [software-pg, intel-pg, nvidia-pg]
    restart: unless-stopped
    networks:
      - sma-net
    environment:
      POSTGRES_DB: ${SMA_DAEMON_DB_NAME:-${POSTGRES_DB:-sma}}
      POSTGRES_USER: ${SMA_DAEMON_DB_USER:-${POSTGRES_USER:-sma}}
      POSTGRES_PASSWORD: ${SMA_DAEMON_DB_PASSWORD:-${POSTGRES_PASSWORD:?Set SMA_DAEMON_DB_PASSWORD or POSTGRES_PASSWORD}}
    volumes:
      - sma-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SMA_DAEMON_DB_USER:-${POSTGRES_USER:-sma}} -d ${SMA_DAEMON_DB_NAME:-${POSTGRES_DB:-sma}}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ────────────────────────────────────────────────────────────────────
  # Encoder/profile matrix:
  #   software      — CPU-only, external PostgreSQL or no DB
  #   software-pg   — CPU-only, bundled PostgreSQL
  #   intel         — Intel QSV + VAAPI, external PostgreSQL or no DB
  #   intel-pg      — Intel QSV + VAAPI, bundled PostgreSQL
  #   nvidia        — NVIDIA NVENC/NVDEC, external PostgreSQL or no DB
  #   nvidia-pg     — NVIDIA NVENC/NVDEC, bundled PostgreSQL
  #
  # Examples:
  #   docker compose --profile software up
  #   docker compose --profile software-pg up
  #   docker compose --profile intel up
  #   docker compose --profile intel-pg up
  #   docker compose --profile nvidia up
  #   docker compose --profile nvidia-pg up
  # ────────────────────────────────────────────────────────────────────
  sma-software:
    <<: *sma-common
    container_name: sma-ng-software
    profiles: [software]
    environment:
      <<: *sma-env
      SMA_DAEMON_DB_URL: ${SMA_DAEMON_DB_URL:-}

  sma-software-pg:
    <<: *sma-common
    container_name: sma-ng-software-pg
    profiles: [software-pg]
    environment:
      <<: *sma-env
    depends_on:
      <<: *sma-depends-on-pg

  sma-nvidia:
    <<: [*sma-common, *sma-nvidia-deploy]
    container_name: sma-ng-nvidia
    profiles: [nvidia]
    environment:
      <<: [*sma-env, *sma-nvidia-env]
      SMA_DAEMON_DB_URL: ${SMA_DAEMON_DB_URL:-}

  sma-nvidia-pg:
    <<: [*sma-common, *sma-nvidia-deploy]
    container_name: sma-ng-nvidia-pg
    profiles: [nvidia-pg]
    environment:
      <<: [*sma-env, *sma-nvidia-env]
    depends_on:
      <<: *sma-depends-on-pg

  sma-intel:
    <<: [*sma-common, *sma-intel-device-config]
    container_name: sma-ng-intel
    profiles: [intel]
    environment:
      <<: [*sma-env, *sma-intel-env]
      SMA_DAEMON_DB_URL: ${SMA_DAEMON_DB_URL:-}

  sma-intel-pg:
    <<: [*sma-common, *sma-intel-device-config]
    container_name: sma-ng-intel-pg
    profiles: [intel-pg]
    environment:
      <<: [*sma-env, *sma-intel-env]
    depends_on:
      <<: *sma-depends-on-pg

volumes:
  sma-pgdata:

networks:
  sma-net:
    driver: bridge
    internal: false
