services:

  # ────────────────────────────────────────────────────────────────────
  # Encoder/profile matrix:
  #   software      — CPU-only, local SQLite by default
  #   software-pg   — CPU-only, external PostgreSQL via SMA_DB_URL/SMA_DAEMON_DB_URL
  #   intel         — Intel QSV + VAAPI, local SQLite by default
  #   intel-pg      — Intel QSV + VAAPI, external PostgreSQL via SMA_DB_URL/SMA_DAEMON_DB_URL
  #   nvidia        — NVIDIA NVENC/NVDEC, local SQLite by default
  #   nvidia-pg     — NVIDIA NVENC/NVDEC, external PostgreSQL via SMA_DB_URL/SMA_DAEMON_DB_URL
  #
  # Examples:
  #   docker compose --profile software up
  #   docker compose --profile software-pg up
  #   docker compose --profile intel up
  #   docker compose --profile intel-pg up
  #   docker compose --profile nvidia up
  #   docker compose --profile nvidia-pg up
  # ────────────────────────────────────────────────────────────────────
  sma-software:
    image: ${SMA_IMAGE:-ghcr.io/newdave/sma-ng}:${SMA_IMAGE_TAG:-latest}
    container_name: sma-ng
    hostname: "${SMA_NODE_NAME:-sma-ng}"
    profiles: [software]
    restart: unless-stopped
    # Workaround for host AppArmor docker-default profile denying AF_UNIX
    # socket creation when dockerd runs nested inside an LXC. Affects pgsql
    # (cannot create /var/run/postgresql/.s.PGSQL.5432) and python AF_UNIX
    # users in the sma daemon. Safe on non-LXC hosts.
    security_opt:
      - apparmor=unconfined
    ports:
      - "${SMA_PORT:-8585}:8585"
    volumes:
      - /opt/sma/config:/config
      - /opt/sma/logs:/logs
      - /opt/sma/data:/data
      - /mnt:/mnt
      - /mnt/unionfs/downloads:/downloads
      - /transcodes:/transcodes
    env_file:
      - path: /opt/sma/config/daemon.env
        required: true
    environment:
      SMA_CONFIG: "${SMA_CONFIG:-/config/sma-ng.yml}"
      SMA_DAEMON_DB_URL: "${SMA_DAEMON_DB_URL:-${SMA_DB_URL:-sqlite:////data/sma-ng.db}}"
    networks:
      - sma-net

  sma-software-pg:
    image: ${SMA_IMAGE:-ghcr.io/newdave/sma-ng}:${SMA_IMAGE_TAG:-latest}
    container_name: sma-ng
    hostname: "${SMA_NODE_NAME:-sma-ng}"
    profiles: [software-pg]
    restart: unless-stopped
    # Workaround for host AppArmor docker-default profile denying AF_UNIX
    # socket creation when dockerd runs nested inside an LXC. Affects pgsql
    # (cannot create /var/run/postgresql/.s.PGSQL.5432) and python AF_UNIX
    # users in the sma daemon. Safe on non-LXC hosts.
    security_opt:
      - apparmor=unconfined
    ports:
      - "${SMA_PORT:-8585}:8585"
    volumes:
      - /opt/sma/config:/config
      - /opt/sma/logs:/logs
      - /opt/sma/data:/data
      - /mnt:/mnt
      - /mnt/unionfs/downloads:/downloads
      - /transcodes:/transcodes
    env_file:
      - path: /opt/sma/config/daemon.env
        required: true
    environment:
      SMA_CONFIG: "${SMA_CONFIG:-/config/sma-ng.yml}"
      SMA_DAEMON_DB_URL: "${SMA_DAEMON_DB_URL:-${SMA_DB_URL:-}}"
    networks:
      - sma-net

  sma-nvidia:
    image: ${SMA_IMAGE:-ghcr.io/newdave/sma-ng}:${SMA_IMAGE_TAG:-latest}
    container_name: sma-ng
    hostname: "${SMA_NODE_NAME:-sma-ng}"
    profiles: [nvidia]
    restart: unless-stopped
    # Workaround for host AppArmor docker-default profile denying AF_UNIX
    # socket creation when dockerd runs nested inside an LXC. Affects pgsql
    # (cannot create /var/run/postgresql/.s.PGSQL.5432) and python AF_UNIX
    # users in the sma daemon. Safe on non-LXC hosts.
    security_opt:
      - apparmor=unconfined
    ports:
      - "${SMA_PORT:-8585}:8585"
    volumes:
      - /opt/sma/config:/config
      - /opt/sma/logs:/logs
      - /opt/sma/data:/data
      - /mnt:/mnt
      - /mnt/unionfs/downloads:/downloads
      - /transcodes:/transcodes
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, video]
    env_file:
      - path: /opt/sma/config/daemon.env
        required: true
    environment:
      SMA_CONFIG: "${SMA_CONFIG:-/config/sma-ng.yml}"
      SMA_DAEMON_DB_URL: "${SMA_DAEMON_DB_URL:-${SMA_DB_URL:-sqlite:////data/sma-ng.db}}"
      NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-all}"
      NVIDIA_DRIVER_CAPABILITIES: "${NVIDIA_DRIVER_CAPABILITIES:-compute,video,utility}"
    networks:
      - sma-net

  sma-nvidia-pg:
    image: ${SMA_IMAGE:-ghcr.io/newdave/sma-ng}:${SMA_IMAGE_TAG:-latest}
    container_name: sma-ng
    hostname: "${SMA_NODE_NAME:-sma-ng}"
    profiles: [nvidia-pg]
    restart: unless-stopped
    # Workaround for host AppArmor docker-default profile denying AF_UNIX
    # socket creation when dockerd runs nested inside an LXC. Affects pgsql
    # (cannot create /var/run/postgresql/.s.PGSQL.5432) and python AF_UNIX
    # users in the sma daemon. Safe on non-LXC hosts.
    security_opt:
      - apparmor=unconfined
    ports:
      - "${SMA_PORT:-8585}:8585"
    volumes:
      - /opt/sma/config:/config
      - /opt/sma/logs:/logs
      - /opt/sma/data:/data
      - /mnt:/mnt
      - /mnt/unionfs/downloads:/downloads
      - /transcodes:/transcodes
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, video]
    env_file:
      - path: /opt/sma/config/daemon.env
        required: true
    environment:
      SMA_CONFIG: "${SMA_CONFIG:-/config/sma-ng.yml}"
      SMA_DAEMON_DB_URL: "${SMA_DAEMON_DB_URL:-${SMA_DB_URL:-}}"
      NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-all}"
      NVIDIA_DRIVER_CAPABILITIES: "${NVIDIA_DRIVER_CAPABILITIES:-compute,video,utility}"
    networks:
      - sma-net

  sma-intel:
    image: ${SMA_IMAGE:-ghcr.io/newdave/sma-ng}:${SMA_IMAGE_TAG:-latest}
    container_name: sma-ng
    hostname: "${SMA_NODE_NAME:-sma-ng}"
    profiles: [intel]
    restart: unless-stopped
    # Workaround for host AppArmor docker-default profile denying AF_UNIX
    # socket creation when dockerd runs nested inside an LXC. Affects pgsql
    # (cannot create /var/run/postgresql/.s.PGSQL.5432) and python AF_UNIX
    # users in the sma daemon. Safe on non-LXC hosts.
    security_opt:
      - apparmor=unconfined
    ports:
      - "${SMA_PORT:-8585}:8585"
    volumes:
      - /opt/sma/config:/config
      - /opt/sma/logs:/logs
      - /opt/sma/data:/data
      - /mnt:/mnt
      - /mnt/unionfs/downloads:/downloads
      - /transcodes:/transcodes
    devices:
      - /dev/dri:/dev/dri
    # No group_add: the entrypoint runs as root, stats the mapped /dev/dri
    # device nodes, adds the `ubuntu` runtime user to whatever groups own
    # them, then drops privileges via setpriv. Works regardless of the
    # host's render/video GID assignments.
    env_file:
      - path: /opt/sma/config/daemon.env
        required: true
    environment:
      SMA_CONFIG: "${SMA_CONFIG:-/config/sma-ng.yml}"
      SMA_DAEMON_DB_URL: "${SMA_DAEMON_DB_URL:-${SMA_DB_URL:-sqlite:////data/sma-ng.db}}"
    networks:
      - sma-net

  sma-intel-pg:
    image: ${SMA_IMAGE:-ghcr.io/newdave/sma-ng}:${SMA_IMAGE_TAG:-latest}
    container_name: sma-ng
    hostname: "${SMA_NODE_NAME:-sma-ng}"
    profiles: [intel-pg]
    restart: unless-stopped
    # Workaround for host AppArmor docker-default profile denying AF_UNIX
    # socket creation when dockerd runs nested inside an LXC. Affects pgsql
    # (cannot create /var/run/postgresql/.s.PGSQL.5432) and python AF_UNIX
    # users in the sma daemon. Safe on non-LXC hosts.
    security_opt:
      - apparmor=unconfined
    ports:
      - "${SMA_PORT:-8585}:8585"
    volumes:
      - /opt/sma/config:/config
      - /opt/sma/logs:/logs
      - /opt/sma/data:/data
      - /mnt:/mnt
      - /mnt/unionfs/downloads:/downloads
      - /transcodes:/transcodes
    devices:
      - /dev/dri/card1:/dev/dri/card0
      - /dev/dri/renderD128:/dev/dri/renderD128
    # No group_add: the entrypoint runs as root, stats the mapped /dev/dri
    # device nodes, adds the `ubuntu` runtime user to whatever groups own
    # them, then drops privileges via setpriv. Works regardless of the
    # host's render/video GID assignments.
    env_file:
      - path: /opt/sma/config/daemon.env
        required: true
    environment:
      SMA_CONFIG: "${SMA_CONFIG:-/config/sma-ng.yml}"
      SMA_DAEMON_DB_URL: "${SMA_DAEMON_DB_URL:-${SMA_DB_URL:-}}"
    networks:
      - sma-net

networks:
  sma-net:
    driver: bridge
    internal: false
