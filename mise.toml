[tools]
python = "3.12"

[env]
VENV    = "venv"
PY      = "venv/bin/python"
PIP     = "venv/bin/pip"

# ---------------------------------------------------------------------------
# Dev environment
# ---------------------------------------------------------------------------

[tasks.venv]
description = "Create virtual environment"
run = """
python3 -m venv $VENV
$PIP install --upgrade pip
"""

[tasks.install]
description = "Install base dependencies"
depends = ["venv"]
run = "$PIP install -r setup/requirements.txt"

[tasks.install-dev]
description = "Install dev dependencies (lint, test)"
depends = ["install"]
run = "$PIP install -e '.[dev]'"

[tasks.install-all]
description = "Install all optional dependencies (qbittorrent, deluge, dev)"
depends = ["install-dev"]
run = """
$PIP install -r setup/requirements-qbittorrent.txt
$PIP install -r setup/requirements-deluge.txt
"""

[tasks.lint]
description = "Run linter (ruff)"
run = "$PY -m ruff check ."

[tasks.lint-fix]
description = "Run linter with auto-fix"
run = "$PY -m ruff check --fix ."

[tasks.test]
description = "Run tests (smoke tests auto-skip without fixture/ffmpeg; daemon tests skip without TEST_DB_URL)"
run = "$PY -m pytest"

[tasks.test-cov]
description = "Run tests with coverage (HTML + terminal summary)"
run = "$PY -m pytest --cov=resources --cov=converter --cov-report=html --cov-report=term-missing:skip-covered"

[tasks.clean]
description = "Remove build artifacts and caches"
run = """
find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
find . -type f -name '*.pyc' -delete 2>/dev/null || true
rm -rf build/ dist/ *.egg-info/ .pytest_cache/ htmlcov/ .coverage .ruff_cache/
"""

# ---------------------------------------------------------------------------
# Media tools
# ---------------------------------------------------------------------------

[tasks.daemon]
description = "Start the daemon server (requires SMA_DAEMON_DB_URL or db_url in config/daemon.json)"
run = "$PY daemon.py --host 0.0.0.0 --port 8585"

[tasks.convert]
description = "Convert a file (usage: mise run convert -- /path/to/file.mkv)"
run = '$PY manual.py -i "$1" -a'

[tasks.codecs]
description = "List supported codecs"
run = "$PY manual.py -cl"

[tasks.preview]
description = "Preview conversion options (usage: mise run preview -- /path/to/file.mkv)"
run = '$PY manual.py -i "$1" -oo'

[tasks.rename]
description = "Rename media files using naming templates (usage: mise run rename -- /path/to/file-or-dir)"
run = '$PY rename.py "$@"'

# ---------------------------------------------------------------------------
# GPU detection & config generation
# ---------------------------------------------------------------------------

[tasks.detect-gpu]
description = "Detect GPU type for hardware acceleration"
run = "./scripts/detect-gpu.sh"

[tasks.config]
description = "Create config with GPU auto-detection (GPU=<type> mise run config to override)"
run = "./scripts/generate-configs.sh"

# ---------------------------------------------------------------------------
# Deployment
# ---------------------------------------------------------------------------

[tasks."deploy:restart"]
description = "Force-restart the sma-daemon systemd service immediately (skips graceful drain)"
run = """
sudo systemctl kill --signal=SIGKILL sma-daemon 2>/dev/null || true
sudo systemctl reset-failed sma-daemon 2>/dev/null || true
sudo systemctl start sma-daemon
sudo systemctl status sma-daemon --no-pager -l
"""

# ---------------------------------------------------------------------------
# System install (on-host, typically run via SSH)
# ---------------------------------------------------------------------------

[tasks.systemd-install]
description = "Install systemd service (run as root)"
run = 'make systemd-install SERVICE_USER="${SERVICE_USER:-$(whoami)}"'

# ---------------------------------------------------------------------------
# Docker
# ---------------------------------------------------------------------------

[tasks."docker:build"]
description = "Build the Docker image locally for the native platform (PLATFORM=linux/amd64 to override; TAG=sma-ng:local to override tag)"
run = """
TAG="${TAG:-sma-ng:local}"
FFMPEG_VERSION="${FFMPEG_VERSION:-8.1}"
# Default to native platform so --load works (multi-platform requires --push).
# Detect native arch: arm64 on Apple Silicon, amd64 on x86-64.
NATIVE="linux/$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')"
PLATFORM="${PLATFORM:-$NATIVE}"
echo "Building $TAG (FFmpeg ${FFMPEG_VERSION}, platform: ${PLATFORM})..."
docker build \
  --file docker/Dockerfile \
  --target runtime \
  --platform "${PLATFORM}" \
  --build-arg FFMPEG_VERSION="${FFMPEG_VERSION}" \
  --tag "$TAG" \
  .
echo ""
echo "Built: $TAG"
echo "Run:   docker run --rm -p 8585:8585 -v $(pwd)/config:/config $TAG"
"""

[tasks."docker:push"]
description = "Build and push a multi-platform image (linux/amd64 + linux/arm64) via buildx (IMAGE=ghcr.io/owner/sma-ng:latest to override)"
run = """
if [ -z "${IMAGE:-}" ]; then
  echo "Error: IMAGE is required (e.g. IMAGE=ghcr.io/owner/sma-ng:latest mise run docker:push)" >&2
  exit 1
fi
FFMPEG_VERSION="${FFMPEG_VERSION:-8.1}"
echo "Building and pushing multi-platform image: $IMAGE (FFmpeg ${FFMPEG_VERSION})..."
docker buildx build \
  --file docker/Dockerfile \
  --target runtime \
  --platform linux/amd64,linux/arm64 \
  --build-arg FFMPEG_VERSION="${FFMPEG_VERSION}" \
  --tag "$IMAGE" \
  --push \
  .
echo "Pushed: $IMAGE"
"""

[tasks."docker:run"]
description = "Run the locally-built Docker image (requires SMA_DAEMON_DB_URL; TAG=sma-ng:local to override)"
run = "./scripts/docker-run.sh"

[tasks."docker:shell"]
description = "Open a shell in the locally-built Docker image"
run = """
TAG="${TAG:-sma-ng:local}"
docker run --rm -it \
  -v "$(pwd)/config:/config" \
  -v "$(pwd)/logs:/logs" \
  --entrypoint /bin/sh \
  "$TAG"
"""

[tasks."docker:smoke"]
description = "Smoke-test the locally-built image: verify Python imports and ffmpeg"
run = """
TAG="${TAG:-sma-ng:local}"
echo "--- import checks ---"
docker run --rm --entrypoint python3 "$TAG" \
  -c "import daemon, resources.readsettings, converter; print('imports OK')"
echo "--- ffmpeg version ---"
docker run --rm --entrypoint ffmpeg "$TAG" -version | head -2
echo "--- ffprobe version ---"
docker run --rm --entrypoint ffprobe "$TAG" -version | head -2
echo "Smoke tests passed."
"""
