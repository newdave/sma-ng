[tools]
python = "3.12"

[env]
VENV    = "venv"
PY      = "venv/bin/python"
PIP     = "venv/bin/pip"

# ---------------------------------------------------------------------------
# Dev environment
# ---------------------------------------------------------------------------

[tasks.venv]
description = "Create virtual environment"
run = """
python3 -m venv $VENV
$PIP install --upgrade pip
"""

[tasks.install]
description = "Install base dependencies"
depends = ["venv"]
run = "$PIP install -r setup/requirements.txt"

[tasks.install-dev]
description = "Install dev dependencies (lint, test)"
depends = ["install"]
run = "$PIP install -e '.[dev]'"

[tasks.install-all]
description = "Install all optional dependencies (qbittorrent, deluge, dev)"
depends = ["install-dev"]
run = """
$PIP install -r setup/requirements-qbittorrent.txt
$PIP install -r setup/requirements-deluge.txt
"""

[tasks.lint]
description = "Run linter (ruff)"
run = "$PY -m ruff check ."

[tasks.lint-fix]
description = "Run linter with auto-fix"
run = "$PY -m ruff check --fix ."

[tasks.test]
description = "Run tests (smoke tests auto-skip without fixture/ffmpeg; daemon tests skip without TEST_DB_URL)"
run = "$PY -m pytest"

[tasks.test-cov]
description = "Run tests with coverage (HTML + terminal summary)"
run = "$PY -m pytest --cov=resources --cov=converter --cov-report=html --cov-report=term-missing:skip-covered"

[tasks.clean]
description = "Remove build artifacts and caches"
run = """
find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
find . -type f -name '*.pyc' -delete 2>/dev/null || true
rm -rf build/ dist/ *.egg-info/ .pytest_cache/ htmlcov/ .coverage .ruff_cache/
"""

# ---------------------------------------------------------------------------
# Media tools
# ---------------------------------------------------------------------------

[tasks.daemon]
description = "Start the daemon server (requires SMA_DAEMON_DB_URL or db_url in config/daemon.json)"
run = "$PY daemon.py --host 0.0.0.0 --port 8585"

[tasks.convert]
description = "Convert a file (usage: mise run convert -- /path/to/file.mkv)"
run = '$PY manual.py -i "$1" -a'

[tasks.codecs]
description = "List supported codecs"
run = "$PY manual.py -cl"

[tasks.preview]
description = "Preview conversion options (usage: mise run preview -- /path/to/file.mkv)"
run = '$PY manual.py -i "$1" -oo'

# ---------------------------------------------------------------------------
# GPU detection & config generation
# ---------------------------------------------------------------------------

[tasks.detect-gpu]
description = "Detect GPU type for hardware acceleration"
run = """
if [ "$(uname)" = "Darwin" ]; then
  if sysctl -n machdep.cpu.brand_string 2>/dev/null | grep -qi apple; then
    echo videotoolbox; exit 0
  fi
  echo software; exit 0
fi
if command -v nvidia-smi >/dev/null 2>&1 && nvidia-smi >/dev/null 2>&1; then
  echo nvenc; exit 0
fi
if [ -d /sys/module/i915 ] || (command -v vainfo >/dev/null 2>&1 && vainfo 2>&1 | grep -qi intel); then
  echo qsv; exit 0
fi
if [ -e /dev/dri/renderD128 ] && command -v vainfo >/dev/null 2>&1 && vainfo >/dev/null 2>&1; then
  echo vaapi; exit 0
fi
echo software
"""

[tasks.config]
description = "Create config with GPU auto-detection (GPU=<type> mise run config to override)"
run = """
GPU="${GPU:-$(mise run detect-gpu 2>/dev/null)}"
mkdir -p config

create_ini() {
  local dest="$1" sample="$2" label="$3"
  if [ -f "$dest" ]; then
    echo "$dest already exists, skipping (delete it first to regenerate)"
  else
    cp "$sample" "$dest"
    if [ "$GPU" != "software" ]; then
      sed -i.bak "s/^gpu *=.*/gpu = $GPU/" "$dest" && rm -f "${dest}.bak"
      echo "Created $dest ($label, gpu = $GPU)"
    else
      echo "Created $dest ($label, software encoding)"
    fi
  fi
}

create_ini config/autoProcess.ini    setup/autoProcess.ini.sample    "regular quality"
create_ini config/autoProcess.rq.ini setup/autoProcess.ini.sample    "regular quality"
create_ini config/autoProcess.lq.ini setup/autoProcess.ini.sample-lq "lower quality"

test -f config/daemon.json || (cp setup/daemon.json.sample config/daemon.json && echo "Created config/daemon.json")

# Create and populate per-service autoProcess files from setup/.local.ini
if [ -f setup/.local.ini ]; then
  echo "Populating per-service configs from setup/.local.ini..."
  python3 scripts/populate-service-configs.py setup/.local.ini setup/autoProcess.ini.sample --gpu "$GPU"
fi
"""

# ---------------------------------------------------------------------------
# Deployment
# ---------------------------------------------------------------------------

[tasks."deploy:restart"]
description = "Force-restart the sma-daemon systemd service immediately (skips graceful drain)"
run = """
sudo systemctl kill --signal=SIGKILL sma-daemon 2>/dev/null || true
sudo systemctl reset-failed sma-daemon 2>/dev/null || true
sudo systemctl start sma-daemon
sudo systemctl status sma-daemon --no-pager -l
"""

# ---------------------------------------------------------------------------
# System install (on-host, typically run via SSH)
# ---------------------------------------------------------------------------

[tasks.systemd-install]
description = "Install systemd service (run as root)"
run = """
sudo cp setup/sma-daemon.service /etc/systemd/system/
sudo systemctl daemon-reload
echo "Service installed. Enable with: sudo systemctl enable --now sma-daemon"
"""

# ---------------------------------------------------------------------------
# Docker
# ---------------------------------------------------------------------------

[tasks."docker:build"]
description = "Build the Docker image locally (TAG=sma-ng:local to override)"
run = """
TAG="${TAG:-sma-ng:local}"
FFMPEG_VERSION="${FFMPEG_VERSION:-8.0}"
echo "Building $TAG (FFmpeg ${FFMPEG_VERSION})..."
docker build \
  --file docker/Dockerfile \
  --target runtime \
  --build-arg FFMPEG_VERSION="${FFMPEG_VERSION}" \
  --tag "$TAG" \
  .
echo ""
echo "Built: $TAG"
echo "Run:   docker run --rm -p 8585:8585 -v $(pwd)/config:/config $TAG"
"""

[tasks."docker:run"]
description = "Run the locally-built Docker image (requires SMA_DAEMON_DB_URL; TAG=sma-ng:local to override)"
run = """
TAG="${TAG:-sma-ng:local}"
if [ -z "${SMA_DAEMON_DB_URL:-}" ]; then
  echo "Error: SMA_DAEMON_DB_URL is required (no SQLite fallback)" >&2
  echo "  Example: SMA_DAEMON_DB_URL=postgresql://sma:pass@host:5432/sma mise run docker:run" >&2
  exit 1
fi
mkdir -p config logs
docker run --rm \
  -p 8585:8585 \
  -e SMA_DAEMON_DB_URL="${SMA_DAEMON_DB_URL}" \
  -v "$(pwd)/config:/config" \
  -v "$(pwd)/logs:/logs" \
  "$TAG"
"""

[tasks."docker:shell"]
description = "Open a shell in the locally-built Docker image"
run = """
TAG="${TAG:-sma-ng:local}"
docker run --rm -it \
  -v "$(pwd)/config:/config" \
  -v "$(pwd)/logs:/logs" \
  --entrypoint /bin/sh \
  "$TAG"
"""

[tasks."docker:smoke"]
description = "Smoke-test the locally-built image: verify Python imports and ffmpeg"
run = """
TAG="${TAG:-sma-ng:local}"
echo "--- import checks ---"
docker run --rm --entrypoint python3 "$TAG" \
  -c "import daemon, resources.readsettings, converter; print('imports OK')"
echo "--- ffmpeg version ---"
docker run --rm --entrypoint ffmpeg "$TAG" -version | head -2
echo "--- ffprobe version ---"
docker run --rm --entrypoint ffprobe "$TAG" -version | head -2
echo "Smoke tests passed."
"""
